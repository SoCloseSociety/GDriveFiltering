<svg xmlns="http://www.w3.org/2000/svg" width="920" height="520" viewBox="0 0 920 520" font-family="-apple-system,Segoe UI,Roboto,sans-serif">
  <rect width="920" height="520" rx="16" fill="#0d1117"/>
  <!-- header -->
  <text x="28" y="44" fill="#e6edf3" font-size="20" font-weight="700">🗂️ GDriveFiltering</text>
  <rect x="228" y="28" width="96" height="22" rx="11" fill="none" stroke="#2ea04366"/>
  <text x="276" y="43" fill="#3fb950" font-size="12" text-anchor="middle">read-only</text>
  <rect x="334" y="28" width="150" height="22" rx="11" fill="none" stroke="#30363d"/>
  <text x="409" y="43" fill="#8b98a5" font-size="12" text-anchor="middle">disk · 384 GB free</text>
  <line x1="0" y1="70" x2="920" y2="70" stroke="#21262d"/>

  <!-- account card -->
  <rect x="24" y="90" width="872" height="170" rx="14" fill="#161b22" stroke="#30363d"/>
  <circle cx="46" cy="120" r="5" fill="#3fb950"/>
  <text x="62" y="125" fill="#e6edf3" font-size="15" font-weight="600">perso</text>
  <text x="120" y="125" fill="#8b98a5" font-size="12">downloading · My Drive + Shared Drives + Shared with me</text>
  <!-- progress -->
  <rect x="46" y="140" width="828" height="16" rx="8" fill="#21262d"/>
  <rect x="46" y="140" width="516" height="16" rx="8" fill="#58a6ff"/>
  <!-- tiles -->
  <g font-size="12">
    <rect x="46" y="172" width="196" height="66" rx="10" fill="#0d1117" stroke="#21262d"/>
    <text x="60" y="200" fill="#e6edf3" font-size="20" font-weight="700">62.3%</text>
    <text x="60" y="222" fill="#8b98a5">62,700 / 100,694 files</text>

    <rect x="256" y="172" width="196" height="66" rx="10" fill="#0d1117" stroke="#21262d"/>
    <text x="270" y="200" fill="#e6edf3" font-size="20" font-weight="700">498 GB</text>
    <text x="270" y="222" fill="#8b98a5">downloaded</text>

    <rect x="466" y="172" width="196" height="66" rx="10" fill="#0d1117" stroke="#21262d"/>
    <text x="480" y="200" fill="#3fb950" font-size="20" font-weight="700">0</text>
    <text x="480" y="222" fill="#8b98a5">errors</text>

    <rect x="676" y="172" width="198" height="66" rx="10" fill="#0d1117" stroke="#21262d"/>
    <text x="690" y="200" fill="#e6edf3" font-size="20" font-weight="700">6h12m</text>
    <text x="690" y="222" fill="#8b98a5">ETA · 41 MB/s</text>
  </g>

  <!-- quick actions -->
  <g font-size="12.5">
    <rect x="24" y="276" width="150" height="30" rx="8" fill="#58a6ff"/>
    <text x="99" y="296" fill="#0d1117" text-anchor="middle" font-weight="600">▶ Resume backup</text>
    <rect x="182" y="276" width="96" height="30" rx="8" fill="#161b22" stroke="#30363d"/>
    <text x="230" y="296" fill="#e6edf3" text-anchor="middle">✓ Verify</text>
    <rect x="286" y="276" width="150" height="30" rx="8" fill="#161b22" stroke="#30363d"/>
    <text x="361" y="296" fill="#e6edf3" text-anchor="middle">📋 Propose clean tree</text>
    <rect x="444" y="276" width="96" height="30" rx="8" fill="#161b22" stroke="#30363d"/>
    <text x="492" y="296" fill="#e6edf3" text-anchor="middle">⧉ Dedup</text>
    <rect x="548" y="276" width="132" height="30" rx="8" fill="#161b22" stroke="#30363d"/>
    <text x="614" y="296" fill="#e6edf3" text-anchor="middle">🗂 Reorganize</text>
  </g>

  <!-- proposal panel -->
  <rect x="24" y="326" width="428" height="170" rx="14" fill="#161b22" stroke="#30363d"/>
  <text x="44" y="352" fill="#e6edf3" font-size="14" font-weight="600">Proposed clean tree — by category</text>
  <g font-size="12" fill="#8b98a5">
    <text x="44" y="382">Images</text>   <rect x="150" y="373" width="230" height="10" rx="5" fill="#21262d"/><rect x="150" y="373" width="230" height="10" rx="5" fill="#58a6ff"/><text x="392" y="382" fill="#8b98a5">31k</text>
    <text x="44" y="408">Videos</text>   <rect x="150" y="399" width="180" height="10" rx="5" fill="#21262d"/><rect x="150" y="399" width="180" height="10" rx="5" fill="#58a6ff"/><text x="392" y="408">2.4k</text>
    <text x="44" y="434">Documents</text><rect x="150" y="425" width="120" height="10" rx="5" fill="#21262d"/><rect x="150" y="425" width="120" height="10" rx="5" fill="#58a6ff"/><text x="392" y="434">18k</text>
    <text x="44" y="460">Archives</text> <rect x="150" y="451" width="70" height="10" rx="5" fill="#21262d"/><rect x="150" y="451" width="70" height="10" rx="5" fill="#58a6ff"/><text x="392" y="460">3.1k</text>
  </g>

  <!-- savings panel -->
  <rect x="468" y="326" width="428" height="170" rx="14" fill="#161b22" stroke="#30363d"/>
  <text x="488" y="352" fill="#e6edf3" font-size="14" font-weight="600">Cleanup preview (nothing deleted)</text>
  <g font-size="13">
    <rect x="488" y="368" width="190" height="52" rx="10" fill="#0d1117" stroke="#21262d"/>
    <text x="502" y="392" fill="#d29922" font-size="18" font-weight="700">-24.6 GB</text>
    <text x="502" y="410" fill="#8b98a5" font-size="12">3,180 exact duplicates</text>
    <rect x="688" y="368" width="190" height="52" rx="10" fill="#0d1117" stroke="#21262d"/>
    <text x="702" y="392" fill="#d29922" font-size="18" font-weight="700">1,204</text>
    <text x="702" y="410" fill="#8b98a5" font-size="12">junk files quarantined</text>
  </g>
  <text x="488" y="446" fill="#8b98a5" font-size="12">Duplicates &amp; junk are moved to _quarantine/ in a COPY —</text>
  <text x="488" y="464" fill="#8b98a5" font-size="12">the source mirror is never modified. Purge is opt-in only.</text>
</svg>
